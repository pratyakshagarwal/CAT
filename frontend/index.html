<!DOCTYPE html>
<html>
<head>
  <title>CAT Assessment</title>
</head>
<body>

  <div id="app"></div>

  <script>
    const API = "http://localhost:8000";
    let session_id = null;
    let question_id = null;
    let question_count = 0;
    const MAX_QUESTIONS = 2;

    // ── render helpers ──────────────────────────────
    function render(html) {
      document.getElementById("app").innerHTML = html;
    }

    // ── SCREEN 1: Start ─────────────────────────────
    function showStart() {
      render(`
        <h2>CAT Assessment</h2>
        <label>Exam:</label><br>
        <input id="exam" placeholder="JEE" /><br><br>

        <label>Subjects (comma separated):</label><br>
        <input id="subjects" placeholder="Physics, Chemistry" /><br><br>

        <label>Topics (comma separated):</label><br>
        <input id="topics" placeholder="Mechanics, Optics" /><br><br>

        <button onclick="startSession()">Start Test</button>
        <p id="msg"></p>
      `);
    }

    async function startSession() {
      const exam = document.getElementById("exam").value;
      const subjects = document.getElementById("subjects").value.split(",").map(s => s.trim());
      const topics = document.getElementById("topics").value.split(",").map(t => t.trim());

      document.getElementById("msg").innerText = "Starting...";

      const res = await fetch(`${API}/start-session`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ exam, subjects, topics })
      });
      const data = await res.json();
      session_id = data.session_id;
      fetchQuestion();
    }

    // ── SCREEN 2: Question ───────────────────────────
    async function fetchQuestion() {
      render(`<p>Loading question...</p>`);

      const res = await fetch(`${API}/generate_questions`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ session_id })
      });
      const q = await res.json();
      question_id = q.id;
      showQuestion(q);
    }

    function showQuestion(q) {
      const opts = Object.entries(q.options).map(([key, val]) => `
        <li>
          <label>
            <input type="radio" name="answer" value="${key}" />
            <b>${key}.</b> ${val}
          </label>
        </li>
      `).join("");

      render(`
        <p>Question ${question_count + 1} of ${MAX_QUESTIONS}</p>
        <p>Subject: ${q.subject} | Topic: ${q.topic} | Difficulty: ${q.difficulty.toFixed(2)}</p>
        <hr>
        <p>${q.q_text}</p>
        <ul style="list-style:none">${opts}</ul>
        <button onclick="submitAnswer()">Submit</button>
        <p id="msg"></p>
      `);
    }

    async function submitAnswer() {
      const selected = document.querySelector('input[name="answer"]:checked');
      if (!selected) {
        document.getElementById("msg").innerText = "Please select an answer.";
        return;
      }

      document.getElementById("msg").innerText = "Submitting...";

      const res = await fetch(`${API}/submit-answer`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          session_id,
          question_id,
          user_answer: selected.value
        })
      });
      const result = await res.json();
      question_count++;
      showFeedback(result);
    }

    // ── SCREEN 3: Feedback ───────────────────────────
    function showFeedback(result) {
      render(`
        <p>${result.correct ? "✓ Correct!" : "✗ Wrong"}</p>
        <p>Correct answer: ${result.correct_answer}</p>
        <p>Explanation: ${result.explanation}</p>
        <br>
        <button onclick="${question_count >= MAX_QUESTIONS ? 'showResults()' : 'fetchQuestion()'}">
          ${question_count >= MAX_QUESTIONS ? "View Results" : "Next Question"}
        </button>
      `);
    }

    // ── SCREEN 4: Results ────────────────────────────
    function formatInsight(text) {
    return text
      .replace(/\*\*(.*?)\*\*/g, "<strong>$1</strong>")  // **bold**
      .replace(/\n\n/g, "<br><br>")                       // paragraph breaks
      .replace(/\n\* /g, "<br>• ")                        // bullet points
      .replace(/\n(\d+)\. /g, "<br>$1. ");                // numbered lists
    }
    async function showResults() {
      render(`<p>Generating your report...</p>`);

      const res = await fetch(`${API}/get_insights/${session_id}`);
      const data = await res.json();

      render(`
        <h2>Test Complete</h2>
        <hr>
        <p>${formatInsight(data.insight || data.message)}</p>
        <br>
        <button onclick="location.reload()">Start Again</button>
      `);
    }

    // ── Boot ─────────────────────────────────────────
    showStart();
  </script>

</body>
</html>
